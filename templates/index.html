<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collaborative Whiteboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background-color: #f3f4f6; }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        .tool-btn { transition: all 0.2s ease; }
        .tool-btn.active { background-color: #e0e7ff; color: #4f46e5; border-color: #c7d2fe; }
        #page-bar { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }
        #page-bar::-webkit-scrollbar { height: 3px; }
        #page-bar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    </style>
</head>
<body>

<!-- ═══ LANDING SCREEN (shown when no ?room= param) ═══ -->
<div id="landing" class="fixed inset-0 z-50 bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center">
    <div class="max-w-sm w-full mx-4 text-center space-y-8">
        <div>
            <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-sm">
                <i class="ph-fill ph-chalkboard text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-3xl font-semibold text-gray-900 mb-3">Whiteboard</h1>
            <p class="text-gray-500 text-sm leading-relaxed">
                Real-time collaborative drawing. Create a room and share the link — everyone sees your strokes instantly.
            </p>
        </div>

        <div class="space-y-3">
            <button id="btn-create-room"
                class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white py-3 px-6 rounded-xl font-medium text-sm transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                <i class="ph ph-plus-circle text-lg"></i>
                Create New Room
            </button>
            <p class="text-xs text-gray-400 pt-1">
                Rooms are temporary — cleared 30 s after everyone leaves.
            </p>
        </div>
    </div>
</div>


<!-- ═══ WHITEBOARD APP (hidden until a room is active) ═══ -->
<div id="app" class="hidden h-screen w-screen flex text-gray-800">

    <!-- ── SIDEBAR TOOLBAR ── -->
    <aside class="w-20 md:w-24 bg-white border-r border-gray-200 flex flex-col items-center py-6 shadow-xl z-10 toolbar-scroll overflow-y-auto shrink-0">
        <div class="mb-6">
            <i class="ph-fill ph-chalkboard text-3xl text-indigo-600"></i>
        </div>

        <div class="flex flex-col gap-4 w-full px-3 flex-1">

            <!-- Draw -->
            <button id="btn-draw"
                class="tool-btn active w-full aspect-square rounded-xl flex flex-col items-center justify-center border border-transparent hover:bg-gray-50 text-gray-600"
                title="Pen Tool">
                <i class="ph ph-pen text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Draw</span>
            </button>

            <!-- Erase -->
            <button id="btn-erase"
                class="tool-btn w-full aspect-square rounded-xl flex flex-col items-center justify-center border border-transparent hover:bg-gray-50 text-gray-600"
                title="Eraser">
                <i class="ph ph-eraser text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Erase</span>
            </button>

            <div class="w-full h-px bg-gray-200 my-1"></div>

            <!-- Colors -->
            <div class="flex flex-col items-center gap-2 w-full">
                <span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Colors</span>
                <div class="grid grid-cols-2 gap-2">
                    <button class="color-btn w-6 h-6 rounded-full bg-black ring-2 ring-offset-2 ring-gray-400 shadow-sm" data-color="#000000"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-red-500 shadow-sm hover:scale-110 transition-transform" data-color="#ef4444"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-blue-500 shadow-sm hover:scale-110 transition-transform" data-color="#3b82f6"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-green-500 shadow-sm hover:scale-110 transition-transform" data-color="#22c55e"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-yellow-400 shadow-sm hover:scale-110 transition-transform" data-color="#facc15"></button>
                    <button class="color-btn w-6 h-6 rounded-full bg-purple-500 shadow-sm hover:scale-110 transition-transform" data-color="#a855f7"></button>
                </div>
            </div>

            <div class="w-full h-px bg-gray-200 my-1"></div>

            <!-- Stroke size -->
            <div class="flex flex-col items-center gap-2 w-full px-2">
                <span class="text-[10px] font-medium text-gray-400 uppercase tracking-wider">Size</span>
                <input type="range" id="stroke-width" min="1" max="20" value="3"
                    class="w-full accent-indigo-600 cursor-pointer">
            </div>

            <div class="w-full h-px bg-gray-200 my-1"></div>

            <!-- Share / Copy Link -->
            <button id="btn-copy-link"
                class="tool-btn w-full aspect-square rounded-xl flex flex-col items-center justify-center border border-transparent hover:bg-indigo-50 text-gray-600"
                title="Copy Room Link">
                <i class="ph ph-link text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Share</span>
            </button>

            <div class="w-full h-px bg-gray-200 my-1"></div>

            <!-- Clear current page -->
            <button id="btn-clear"
                class="mt-auto w-full aspect-square rounded-xl flex flex-col items-center justify-center hover:bg-red-50 text-red-500 transition-colors"
                title="Clear Page">
                <i class="ph ph-trash text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Clear</span>
            </button>
        </div>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Canvas area -->
        <main class="flex-1 relative bg-white shadow-inner overflow-hidden" id="canvas-wrapper">

            <!-- Status badge -->
            <div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border border-gray-100 flex items-center gap-2 z-10">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                <span id="status-text" class="text-xs font-medium text-gray-600">Connecting…</span>
            </div>

            <canvas id="whiteboard"></canvas>
        </main>

        <!-- PAGE TAB BAR -->
        <div id="page-bar" class="h-11 bg-gray-100 border-t border-gray-200 flex items-end px-2 gap-0.5 overflow-x-auto shrink-0">
            <!-- Tabs injected by JS -->
            <button id="btn-add-page"
                class="shrink-0 mb-1 ml-1 w-7 h-7 rounded-lg flex items-center justify-center hover:bg-indigo-100 text-gray-400 hover:text-indigo-600 transition-colors"
                title="New page">
                <i class="ph ph-plus text-sm"></i>
            </button>
        </div>

    </div><!-- /main content -->

</div><!-- /app -->


<script>
// ════════════════════════════════════════════════════════════════════════════
// Landing vs. room routing
// ════════════════════════════════════════════════════════════════════════════
const roomId = new URLSearchParams(location.search).get('room');

if (roomId) {
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initWhiteboard(roomId);
}

document.getElementById('btn-create-room').addEventListener('click', () => {
    location.href = `/?room=${crypto.randomUUID()}`;
});


// ════════════════════════════════════════════════════════════════════════════
// Whiteboard core — only runs when a room ID is present
// ════════════════════════════════════════════════════════════════════════════
function initWhiteboard(roomId) {

    // ── Canvas & context ─────────────────────────────────────────────────────
    const canvas  = document.getElementById('whiteboard');
    const ctx     = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvas-wrapper');

    // ── Drawing state ────────────────────────────────────────────────────────
    let isDrawing      = false;
    let currentMode    = 'draw';    // 'draw' | 'erase'
    let currentColor   = '#000000';
    let currentLineWidth = 3;
    let lastX = 0, lastY = 0;

    // ── Multi-page state ─────────────────────────────────────────────────────
    // Each slot is null (blank) or an ImageData snapshot
    let pages       = [null];
    let currentPage = 0;

    // ── WebSocket ────────────────────────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws    = new WebSocket(`${proto}://${location.host}/ws/${roomId}`);

    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    const STATUS = {
        connecting:   { dot: 'bg-yellow-500 animate-pulse', label: 'Connecting…'     },
        connected:    { dot: 'bg-green-500 animate-pulse',  label: 'Connected'        },
        syncing:      { dot: 'bg-blue-400 animate-pulse',   label: 'Syncing…'         },
        disconnected: { dot: 'bg-red-400',                  label: 'Disconnected'     },
        error:        { dot: 'bg-red-500',                  label: 'Connection Error' },
        cleared:      { dot: 'bg-indigo-400',               label: 'Page Cleared!'    },
        copied:       { dot: 'bg-green-400',                label: 'Link Copied!'     },
    };

    function setStatus(key) {
        const s = STATUS[key] || STATUS.connecting;
        statusDot.className    = `w-2 h-2 rounded-full ${s.dot}`;
        statusText.textContent = s.label;
    }

    ws.onopen  = () => setStatus('connected');
    ws.onclose = () => setStatus('disconnected');
    ws.onerror = () => setStatus('error');

    /** Send any typed event to the server. */
    function sendWS(data) {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(data));
        }
    }

    // ════════════════════════════════════════════════════════════════════════
    // Typed event receiver
    //
    //   draw        — a remote draw segment (may be on any page)
    //   page_add    — another client added a page
    //   page_delete — another client deleted a page
    //   clear_page  — another client wiped a page
    //   sync        — server-sent replay log sent to new joiners only
    // ════════════════════════════════════════════════════════════════════════
    ws.onmessage = function (event) {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
            case 'sync':        handleSync(msg);                 break;
            case 'draw':        handleRemoteDraw(msg);           break;
            case 'page_add':    handleRemotePageAdd();           break;
            case 'page_delete': handleRemotePageDelete(msg.page); break;
            case 'clear_page':  handleRemoteClearPage(msg.page); break;
        }
    };

    // ════════════════════════════════════════════════════════════════════════
    // Sync — replay the full history into offscreen canvases, then adopt
    //        the resulting ImageData objects as our pages array.
    // ════════════════════════════════════════════════════════════════════════
    function handleSync(msg) {
        if (!msg.history.length) return;          // empty room — nothing to do
        setStatus('syncing');

        // offscreens: pageIndex → { c: HTMLCanvasElement, cx: CanvasRenderingContext2D }
        const offscreens = new Map();
        let replayPageCount = 1;

        function getOC(pageIdx) {
            if (!offscreens.has(pageIdx)) {
                const c = document.createElement('canvas');
                c.width  = canvas.width;
                c.height = canvas.height;
                const cx = c.getContext('2d', { willReadFrequently: true });
                cx.fillStyle = '#ffffff';
                cx.fillRect(0, 0, c.width, c.height);
                offscreens.set(pageIdx, { c, cx });
            }
            return offscreens.get(pageIdx);
        }

        for (const ev of msg.history) {
            switch (ev.type) {

                case 'draw': {
                    const { cx } = getOC(ev.page);
                    cx.lineCap = cx.lineJoin = 'round';
                    cx.strokeStyle = ev.color;
                    cx.lineWidth   = ev.width;
                    cx.beginPath();
                    cx.moveTo(ev.startX, ev.startY);
                    cx.lineTo(ev.endX,   ev.endY);
                    cx.stroke();
                    break;
                }

                case 'page_add': {
                    replayPageCount++;
                    break;
                }

                case 'page_delete': {
                    if (replayPageCount <= 1) break;
                    // Re-index every canvas whose index is above the deleted one
                    const shifted = new Map();
                    offscreens.forEach((val, idx) => {
                        if      (idx < ev.page) shifted.set(idx,     val);
                        else if (idx > ev.page) shifted.set(idx - 1, val);
                        // idx === ev.page is intentionally dropped
                    });
                    offscreens.clear();
                    shifted.forEach((val, idx) => offscreens.set(idx, val));
                    replayPageCount = Math.max(1, replayPageCount - 1);
                    break;
                }

                case 'clear_page': {
                    if (offscreens.has(ev.page)) {
                        const { c, cx } = offscreens.get(ev.page);
                        cx.fillStyle = '#ffffff';
                        cx.fillRect(0, 0, c.width, c.height);
                    }
                    break;
                }
            }
        }

        // Convert the offscreen canvases into ImageData objects for the pages array
        pages = Array.from({ length: replayPageCount }, (_, i) => {
            const oc = offscreens.get(i);
            return oc ? oc.cx.getImageData(0, 0, oc.c.width, oc.c.height) : null;
        });

        currentPage = 0;
        restorePage();
        renderPageBar();
        setStatus('connected');
    }

    // ════════════════════════════════════════════════════════════════════════
    // Remote draw — render to the visible canvas or an offscreen ImageData
    // ════════════════════════════════════════════════════════════════════════
    function handleRemoteDraw(msg) {
        if (msg.page === currentPage) {
            // Direct — stroke onto the live canvas immediately
            ctx.save();
            ctx.lineCap = ctx.lineJoin = 'round';
            ctx.strokeStyle = msg.color;
            ctx.lineWidth   = msg.width;
            ctx.beginPath();
            ctx.moveTo(msg.startX, msg.startY);
            ctx.lineTo(msg.endX,   msg.endY);
            ctx.stroke();
            ctx.restore();
        } else if (msg.page >= 0 && msg.page < pages.length) {
            // Offscreen — composite into the stored ImageData for that page
            const tmp = document.createElement('canvas');
            tmp.width  = canvas.width;
            tmp.height = canvas.height;
            const tc   = tmp.getContext('2d');
            if (pages[msg.page]) {
                tc.putImageData(pages[msg.page], 0, 0);
            } else {
                tc.fillStyle = '#ffffff';
                tc.fillRect(0, 0, tmp.width, tmp.height);
            }
            tc.lineCap = tc.lineJoin = 'round';
            tc.strokeStyle = msg.color;
            tc.lineWidth   = msg.width;
            tc.beginPath();
            tc.moveTo(msg.startX, msg.startY);
            tc.lineTo(msg.endX,   msg.endY);
            tc.stroke();
            pages[msg.page] = tc.getImageData(0, 0, tmp.width, tmp.height);
        }
    }

    // ════════════════════════════════════════════════════════════════════════
    // Remote page event handlers
    // ════════════════════════════════════════════════════════════════════════

    function handleRemotePageAdd() {
        saveCurrentPage();
        pages.push(null);
        // Remote users don't navigate away — they just see the new tab appear
        renderPageBar();
    }

    function handleRemotePageDelete(pageIdx) {
        if (pages.length <= 1) return;
        if (pageIdx !== currentPage) saveCurrentPage();
        pages.splice(pageIdx, 1);
        if      (pageIdx < currentPage)          currentPage -= 1;
        else if (currentPage >= pages.length)    currentPage  = pages.length - 1;
        restorePage();
        renderPageBar();
    }

    function handleRemoteClearPage(pageIdx) {
        pages[pageIdx] = null;
        if (pageIdx === currentPage) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    // ════════════════════════════════════════════════════════════════════════
    // Canvas resize — preserve the visible drawing across window size changes
    // ════════════════════════════════════════════════════════════════════════
    function resizeCanvas() {
        const snap = document.createElement('canvas');
        snap.width  = canvas.width;
        snap.height = canvas.height;
        if (canvas.width > 0 && canvas.height > 0) {
            snap.getContext('2d').drawImage(canvas, 0, 0);
        }
        canvas.width  = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (snap.width > 0) ctx.drawImage(snap, 0, 0);
        if (canvas.width > 0 && canvas.height > 0) {
            pages[currentPage] = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
        applyCtxSettings();
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Context helper ───────────────────────────────────────────────────────
    function applyCtxSettings() {
        ctx.lineCap     = ctx.lineJoin = 'round';
        ctx.strokeStyle = currentMode === 'erase' ? '#ffffff' : currentColor;
        ctx.lineWidth   = currentMode === 'erase' ? currentLineWidth * 3 : currentLineWidth;
    }

    // ── Pointer coordinate normaliser ────────────────────────────────────────
    function getXY(e) {
        const r = canvas.getBoundingClientRect();
        if (e.touches?.length) {
            return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
        }
        return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    // ════════════════════════════════════════════════════════════════════════
    // Local drawing — each segment is broadcast as a typed 'draw' event
    // ════════════════════════════════════════════════════════════════════════
    function startDrawing(e) {
        isDrawing = true;
        const { x, y } = getXY(e);
        lastX = x; lastY = y;
        // Paint a dot so single clicks/taps are visible locally
        ctx.beginPath();
        ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
        ctx.fillStyle = ctx.strokeStyle;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const { x, y } = getXY(e);
        ctx.lineTo(x, y);
        ctx.stroke();

        sendWS({
            type:   'draw',
            page:   currentPage,
            startX: lastX,  startY: lastY,
            endX:   x,      endY:   y,
            color:  currentMode === 'erase' ? '#ffffff' : currentColor,
            width:  currentMode === 'erase' ? currentLineWidth * 3 : currentLineWidth,
        });

        lastX = x; lastY = y;
    }

    function stopDrawing() {
        if (!isDrawing) return;
        isDrawing = false;
        ctx.beginPath();  // reset path so the next stroke won't connect accidentally
    }

    canvas.addEventListener('mousedown',  startDrawing);
    canvas.addEventListener('mousemove',  draw);
    window.addEventListener('mouseup',    stopDrawing);
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove',  draw,         { passive: false });
    window.addEventListener('touchend',   stopDrawing);

    // ════════════════════════════════════════════════════════════════════════
    // Multi-page helpers
    // ════════════════════════════════════════════════════════════════════════

    function saveCurrentPage() {
        if (canvas.width > 0 && canvas.height > 0) {
            pages[currentPage] = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
    }

    function restorePage() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (pages[currentPage]) ctx.putImageData(pages[currentPage], 0, 0);
        applyCtxSettings();
    }

    function switchPage(index) {
        if (index === currentPage) return;
        saveCurrentPage();
        currentPage = index;
        restorePage();
        renderPageBar();
    }

    // ── Local page mutations (each broadcasts a typed event) ─────────────────

    function localAddPage() {
        saveCurrentPage();
        pages.push(null);
        currentPage = pages.length - 1;
        restorePage();
        renderPageBar();
        sendWS({ type: 'page_add' });
    }

    function localDeletePage(index) {
        if (pages.length === 1) return;
        if (index !== currentPage) saveCurrentPage();
        pages.splice(index, 1);
        if      (index < currentPage)            currentPage -= 1;
        else if (currentPage >= pages.length)    currentPage  = pages.length - 1;
        restorePage();
        renderPageBar();
        sendWS({ type: 'page_delete', page: index });
    }

    function localClearPage() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pages[currentPage] = null;
        sendWS({ type: 'clear_page', page: currentPage });
        setStatus('cleared');
        const prev = ws.readyState === WebSocket.OPEN ? 'connected' : 'disconnected';
        setTimeout(() => setStatus(prev), 2000);
    }

    // ── Tab-bar renderer ─────────────────────────────────────────────────────
    function renderPageBar() {
        const bar    = document.getElementById('page-bar');
        const addBtn = document.getElementById('btn-add-page');

        bar.querySelectorAll('.page-tab').forEach(t => t.remove());

        pages.forEach((_, i) => {
            const isActive = (i === currentPage);

            const tab = document.createElement('div');
            tab.className = [
                'page-tab flex items-center gap-1 px-3 h-8 rounded-t-lg',
                'text-xs cursor-pointer select-none transition-all',
                'border border-gray-200 border-b-0',
                isActive
                    ? 'bg-white text-indigo-600 font-semibold'
                    : 'bg-gray-50 text-gray-500 hover:bg-gray-200 hover:text-gray-700',
            ].join(' ');
            if (isActive) tab.style.borderTop = '2px solid #4f46e5';

            const lbl = document.createElement('span');
            lbl.textContent = `Page ${i + 1}`;
            tab.appendChild(lbl);

            if (pages.length > 1) {
                const xBtn = document.createElement('button');
                xBtn.innerHTML = '<i class="ph ph-x" style="font-size:9px;line-height:1"></i>';
                xBtn.className = 'ml-1 opacity-50 hover:opacity-100 hover:text-red-500 transition-all';
                xBtn.title     = 'Delete page';
                xBtn.addEventListener('click', e => { e.stopPropagation(); localDeletePage(i); });
                tab.appendChild(xBtn);
            }

            tab.addEventListener('click', () => switchPage(i));
            bar.insertBefore(tab, addBtn);
        });
    }

    document.getElementById('btn-add-page').addEventListener('click', localAddPage);
    renderPageBar();

    // ════════════════════════════════════════════════════════════════════════
    // Toolbar controls
    // ════════════════════════════════════════════════════════════════════════
    const btnDraw  = document.getElementById('btn-draw');
    const btnErase = document.getElementById('btn-erase');

    function setTool(mode) {
        currentMode = mode;
        btnDraw .classList.toggle('active', mode === 'draw');
        btnErase.classList.toggle('active', mode === 'erase');
        canvas.style.cursor = mode === 'erase' ? 'cell' : 'crosshair';
        applyCtxSettings();
    }

    btnDraw .addEventListener('click', () => setTool('draw'));
    btnErase.addEventListener('click', () => setTool('erase'));

    const colorBtns = document.querySelectorAll('.color-btn');
    colorBtns.forEach(btn => btn.addEventListener('click', e => {
        currentColor = e.currentTarget.dataset.color;
        colorBtns.forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400'));
        e.currentTarget.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400');
        setTool('draw');
    }));

    document.getElementById('stroke-width').addEventListener('input', e => {
        currentLineWidth = parseInt(e.target.value, 10);
        applyCtxSettings();
    });

    document.getElementById('btn-clear').addEventListener('click', localClearPage);

    // ── Copy Link ────────────────────────────────────────────────────────────
    document.getElementById('btn-copy-link').addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(location.href);
            setStatus('copied');
        } catch {
            // Clipboard API blocked — fall back to a prompt so the user can copy manually
            window.prompt('Copy this link:', location.href);
            return;
        }
        const prev = ws.readyState === WebSocket.OPEN ? 'connected' : 'disconnected';
        setTimeout(() => setStatus(prev), 2000);
    });

} // ── end initWhiteboard ───────────────────────────────────────────────────
</script>
</body>
</html>
